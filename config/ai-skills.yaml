# DigitalTutor AI Skills Configuration
# Настройки ИИ-скиллов для анализа работ
# 
# Для маленькой модели (Gemma 3 4B) критически важны настройки:
# - Явные критерии оценки
# - Простые промпты без сложных инструкций
# - Пороговые значения для принятия решений

model_settings:
  default_model: "gemma3:4b"
  ollama_host: "http://localhost:11434"
  temperature: 0.3          # Низкая для детерминированных ответов
  max_tokens: 2000          # Ограничение для маленькой модели
  
  # Лимиты для маленькой модели
  limits:
    max_file_size_mb: 10
    max_pages: 50
    chunk_size_chars: 4000

# =============================================================================
# SKILL 1: АНТИПЛАГИАТ
# =============================================================================

skills:
  antiplagiat:
    name: "Антиплагиат"
    description: "Детекция AI-генерации и заимствований в тексте"
    enabled: true
    priority: 1

    # Промпт для анализа (оптимизирован для маленькой модели)
    prompt: |
      Проанализируй текст на признаки:
      1. AI-генерация: однотипные переходы, отсутствие "я", идеальная структура, общие фразы
      2. Заимствования: неестественные переходы, разнородный стиль
      3. Оригинальность: личные примеры, специфичные данные
      
      Верни JSON: {"ai_score": 0-1, "plagiarism_score": 0-1, "originality_score": 0-1}

    # Критерии оценки
    criteria:
      ai_generated:
        name: "AI-генерация"
        weight: 0.4
        indicators:
          - "Однотипные переходы (Кроме того, В заключение, Таким образом)"
          - "Отсутствие личных местоимений (я, мы, мой)"
          - "Идеальная структура без шероховатостей"
          - "Общие фразы без конкретики (важно отметить, следует подчеркнуть)"
        thresholds:
          low: 0.3      # < 30% — скорее всего человек
          medium: 0.6   # 30-60% — требуется проверка
          high: 0.8     # > 60% — вероятно AI

      plagiarism:
        name: "Заимствования"
        weight: 0.3
        indicators:
          - "Неестественные переходы между абзацами"
          - "Разнородный стиль изложения"
          - "Внезапное изменение тона"
          - "Копипаст без адаптации"
        thresholds:
          low: 0.2
          medium: 0.4
          high: 0.6

      originality:
        name: "Оригинальность"
        weight: 0.3
        indicators:
          - "Личные примеры и наблюдения"
          - "Специфичные данные/статистика"
          - "Уникальные формулировки"
          - "Связь с практикой"
        thresholds:
          high: 0.7     # > 70% — оригинально
          medium: 0.5
          low: 0.3

    # Рекомендации по результатам
    recommendations:
      high_ai: |
        Обнаружены признаки AI-генерации. Рекомендуется:
        - Запросить пояснения по ключевым тезисам
        - Проверить знание источников
        - Провести устное обсуждение

      high_plagiarism: |
        Обнаружены признаки заимствований. Рекомендуется:
        - Проверить через официальную систему антиплагиата
        - Запросить черновики и промежуточные версии
        - Сравнить с известными источниками

      low_originality: |
        Низкая оригинальность работы. Рекомендуется:
        - Добавить личные наблюдения и примеры
        - Включить авторский анализ данных
        - Развить собственные выводы

  # =============================================================================
  # SKILL 2: СТРУКТУРА
  # =============================================================================
  structure:
    name: "Структура"
    description: "Проверка академических требований к структуре работы"
    enabled: true
    priority: 2

    prompt: |
      Проверь структуру научной работы на наличие:
      1. Новизны: постановка проблемы, научный вопрос
      2. Методов: описание методологии исследования
      3. Инструментария: используемые методы анализа
      4. Выводов: соответствие выводов поставленным задачам
      
      Верни JSON: {"novelty_score": 0-1, "methods_score": 0-1, "tools_score": 0-1, "conclusions_score": 0-1}

    # Требования по типам работ
    requirements:
      coursework:
        name: "Курсовая работа"
        elements:
          - name: "Введение"
            required: true
            check: "Постановка проблемы, цель, задачи, объект, предмет"
          - name: "Глава 1 (Теоретическая)"
            required: true
            check: "Обзор литературы, минимум 15 источников"
          - name: "Глава 2 (Практическая)"
            required: true
            check: "Методология, данные, анализ"
          - name: "Заключение"
            required: true
            check: "Выводы по каждой задаче, практическая значимость"
          - name: "Список литературы"
            required: true
            check: "Оформление по ГОСТ, актуальность источников"

      thesis:
        name: "ВКР / Диссертация"
        elements:
          - name: "Введение"
            required: true
            check: "Актуальность, научная новизна, практическая значимость"
          - name: "Глава 1"
            required: true
            check: "Теоретические основы, степень разработанности"
          - name: "Глава 2"
            required: true
            check: "Методология исследования"
          - name: "Глава 3"
            required: true
            check: "Результаты и их обсуждение"
          - name: "Заключение"
            required: true
            check: "Научные положения, выносимые на защиту"
          - name: "Список литературы"
            required: true
            check: "Минимум 50 источников, включая зарубежные"

      article:
        name: "Научная статья"
        elements:
          - name: "Аннотация"
            required: true
            check: "150-250 слов, структура: цель, метод, результат, вывод"
          - name: "Ключевые слова"
            required: true
            check: "5-7 слов, релевантность теме"
          - name: "Введение"
            required: true
            check: "Постановка проблемы, актуальность"
          - name: "Основная часть"
            required: true
            check: "Метод, данные, результаты, обсуждение"
          - name: "Заключение"
            required: true
            check: "Главные выводы, ограничения исследования"
          - name: "Список литературы"
            required: true
            check: "10-30 источников"

    # Оценка научного качества
    quality_metrics:
      novelty:
        name: "Научная новизна"
        questions:
          - "Сформулирована ли научная проблема?"
          - "Есть ли научный вопрос, на который отвечает работа?"
          - "Предложен ли новый подход/метод/решение?"

      methodology:
        name: "Методология"
        questions:
          - "Описан ли метод исследования?"
          - "Обоснован ли выбор метода?"
          - "Приведены ли данные для анализа?"

      tools:
        name: "Научный инструментарий"
        questions:
          - "Используются ли конкретные методы анализа?"
          - "Есть ли инструментарий сбора данных?"
          - "Описана ли процедура анализа?"

      conclusions:
        name: "Выводы"
        questions:
          - "Соответствуют ли выводы поставленным задачам?"
          - "Есть ли практические рекомендации?"
          - "Указаны ли ограничения исследования?"

    recommendations:
      low_novelty: |
        Слабая научная новизна. Рекомендуется:
        - Чётче сформулировать научную проблему
        - Показать, чем подход отличается от существующих
        - Выделить научный вопрос, на который даётся ответ

      missing_methodology: |
        Недостаточно описана методология. Рекомендуется:
        - Добавить обоснование выбора методов
        - Описать этапы исследования
        - Указать ограничения применяемых методов

      weak_conclusions: |
        Выводы не соответствуют задачам. Рекомендуется:
        - Структурировать выводы по каждой задаче
        - Добавить практическую значимость
        - Указать направления дальнейших исследований

  # =============================================================================
  # SKILL 3: ОФОРМЛЕНИЕ
  # =============================================================================
  formatting:
    name: "Оформление"
    description: "Проверка соответствия ГОСТ и требованиям к оформлению"
    enabled: true
    priority: 3

    prompt: |
      Проверь оформление документа на соответствие стандарту {{standard}}:
      1. Структура документа: титульный, содержание, нумерация
      2. Форматирование: шрифты, отступы, поля
      3. Ссылки и цитирование: формат ссылок, библиография
      
      Верни JSON: {"structure_score": 0-1, "formatting_score": 0-1, "citations_score": 0-1, "errors": []}

    # Стандарты оформления
    standards:
      gost_coursework:
        name: "ГОСТ для курсовых работ"
        requirements:
          title_page: "Шаблон вуза, все поля заполнены"
          table_of_contents: "С номерами страниц, соответствует структуре"
          page_numbers: "Снизу по центру, с 3-й страницы"
          margins: "Л:3см, П:1.5см, В:2см, Н:2см"
          font: "Times New Roman 14pt"
          line_spacing: "1.5"
          paragraph_indent: "1.25 см"
          references: "ГОСТ Р 7.0.5-2008"

      gost_thesis:
        name: "ГОСТ для ВКР"
        requirements:
          title_page: "Шаблон вуза, подписи"
          table_of_contents: "Автособираемое оглавление"
          page_numbers: "Снизу по центру"
          margins: "Л:3см, П:1см, В:2см, Н:2см"
          font: "Times New Roman 14pt"
          line_spacing: "1.5"
          chapter_headings: "Жирный, по центру, заглавными"
          references: "ГОСТ Р 7.0.100-2018"

      gost_article:
        name: "ГОСТ для научных статей"
        requirements:
          udk: "УДК в левом верхнем углу"
          title: "Полужирный, по центру"
          authors: "И.О. Фамилия, организация"
          abstract: "150-250 слов, на русском и английском"
          keywords: "5-7 слов"
          references: "ГОСТ Р 7.0.5-2008, в квадратных скобках"

    # Журнальные требования (загружаемые)
    journals:
      enabled: true
      storage: "config/journals/"
      format: "yaml"

      # Пример структуры файла журнала
      example:
        name: "Вестник МГУ"
        requirements:
          annotation_words: 150-200
          keywords_count: 5-7
          article_words: 5000-8000
          references_style: "GOST-7-0-5"
          figures: "нумерованные, с подписями"
          tables: "нумерованные, с заголовками"

    # Типичные ошибки оформления
    common_errors:
      - code: "NO_TITLE_PAGE"
        severity: "critical"
        description: "Отсутствует титульный лист"
        fix: "Добавить титульный лист по шаблону вуза"

      - code: "NO_PAGE_NUMBERS"
        severity: "high"
        description: "Отсутствует нумерация страниц"
        fix: "Добавить нумерацию с 3-й страницы"

      - code: "WRONG_MARGINS"
        severity: "medium"
        description: "Не соответствуют поля страницы"
        fix: "Установить поля: левое 3см, правое 1.5см, верхнее/нижнее 2см"

      - code: "WRONG_FONT"
        severity: "medium"
        description: "Неверный шрифт"
        fix: "Использовать Times New Roman 14pt"

      - code: "WRONG_LINE_SPACING"
        severity: "medium"
        description: "Неверный межстрочный интервал"
        fix: "Установить полуторный интервал (1.5)"

      - code: "BAD_REFERENCES"
        severity: "high"
        description: "Некорректное оформление библиографии"
        fix: "Оформить по ГОСТ Р 7.0.5-2008"

# =============================================================================
# НАСТРОЙКИ ВЫПОЛНЕНИЯ
# =============================================================================

execution:
  # Порядок выполнения скиллов
  order:
    - antiplagiat      # Сначала проверка на плагиат
    - structure        # Затем структура
    - formatting       # Наконец оформление

  # Условия пропуска
  skip_conditions:
    antiplagiat:
      skip_if_ai_score_above: 0.9  # Пропустить если явно AI
    structure:
      skip_if_antiplagiat_failed: true
    formatting:
      skip_if_structure_failed: false

  # Кэширование результатов
  cache:
    enabled: true
    ttl_hours: 24
    storage: "redis"

# =============================================================================
# ИНТЕГРАЦИЯ С OLLAMA
# =============================================================================

ollama:
  host: "http://localhost:11434"
  model: "gemma3:4b"
  
  # Оптимизации для маленькой модели
  optimizations:
    split_long_documents: true
    summarize_first: true
    use_simple_prompts: true
    avoid_json_in_output: false
  
  # Fallback на внешнюю модель
  fallback:
    enabled: false
    provider: "openai"
    model: "gpt-4o-mini"
    trigger_on_size_mb: 5

# =============================================================================
# ЛОГИРОВАНИЕ И МЕТРИКИ
# =============================================================================

logging:
  level: "INFO"
  
  metrics:
    track_analysis_time: true
    track_token_usage: true
    track_cache_hits: true
