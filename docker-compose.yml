version: '3.8'

services:
  # === Backend API ===
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: digitatal-backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - minio
      - redis
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    networks:
      - digitatal-network

  # === Telegram Bot ===
  bot:
    build:
      context: ./backend
      dockerfile: Dockerfile.bot
    container_name: digitatal-bot
    restart: always
    env_file:
      - .env
    depends_on:
      - backend
      - postgres
    volumes:
      - ./bot:/app/bot
    networks:
      - digitatal-network

  # === PostgreSQL ===
  postgres:
    image: postgres:15-alpine
    container_name: digitatal-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-teacher}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-teaching}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - digitatal-network

  # === MinIO (S3 storage) ===
  minio:
    image: minio/minio:latest
    container_name: digitatal-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-teacher}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - digitatal-network

  # === Redis ===
  redis:
    image: redis:7-alpine
    container_name: digitatal-redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - digitatal-network

  # === NocoDB (Admin Panel) ===
  nocodb:
    image: nocodb/nocodb:latest
    container_name: digitatal-nocodb
    restart: always
    ports:
      - "8080:8080"
    environment:
      NC_DB: "pg://postgres:5432?u=${POSTGRES_USER:-teacher}&p=${POSTGRES_PASSWORD:-changeme}&d=${POSTGRES_DB:-teaching}"
      NC_AUTH_JWT_SECRET: ${NOCODB_JWT_SECRET:-changeme}
    depends_on:
      - postgres
    networks:
      - digitatal-network

  # === Nginx ===
  nginx:
    image: nginx:alpine
    container_name: digitatal-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./web/student:/usr/share/nginx/html/student
    depends_on:
      - backend
    networks:
      - digitatal-network

volumes:
  postgres_data:
  minio_data:
  redis_data:
  uploads:

networks:
  digitatal-network:
    driver: bridge
