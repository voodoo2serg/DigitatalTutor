version: '3.8'

services:
  # === Backend API ===
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: digitatal-backend
    restart: always
    mem_limit: 1g
    cpus: '1.0'
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - student_files:/app/data/student_files
      - uploads:/app/uploads
      - ./logs/backend:/var/log/backend
    networks:
      - digitatal-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # === Telegram Bot ===
  bot:
    build:
      context: ./bot
    container_name: digitatal-bot
    mem_limit: 512m
    cpus: '0.5'
    environment:
      - DATABASE_URL=postgresql+asyncpg://teacher:KpianDU38usOE7w6OaZxV9ZFZnfe5@digitatal-postgres:5432/teaching
    restart: always
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - student_files:/app/data/student_files
      - ./logs/bot:/var/log/bot
    networks:
      - digitatal-network
    # Healthcheck disabled - bot uses minimal image without pgrep/ps
    # Bot is monitored via logs and Telegram responsiveness
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # === PostgreSQL ===
  postgres:
    image: postgres:15-alpine
    container_name: digitatal-postgres
    restart: always
    mem_limit: 1g
    cpus: '0.75'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-teacher}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-teaching}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./backups:/backups
      - ./logs/postgres:/var/log/postgresql
    # Порт больше не exposed наружу — только внутри сети
    # ports:
    #   - "5433:5432"
    networks:
      - digitatal-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-teacher} -d ${POSTGRES_DB:-teaching}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # === Redis ===
  redis:
    image: redis:7-alpine
    container_name: digitatal-redis
    restart: always
    mem_limit: 256m
    cpus: '0.25'
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
      - ./logs/redis:/var/log/redis
    networks:
      - digitatal-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # === Ollama (Local AI) ===
  ollama:
    image: ollama/ollama:latest
    container_name: digitatal-ollama
    restart: always
    mem_limit: 4g
    cpus: '2.0'
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - digitatal-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # === PostgreSQL Backup Service ===
  # Запускается каждые 6 часов через cron внутри контейнера
  backup:
    image: postgres:15-alpine
    container_name: digitatal-backup
    mem_limit: 256m
    cpus: '0.25'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-teacher}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-teaching}
      BACKUP_RETENTION_DAYS: 7
    volumes:
      - postgres_data:/var/lib/postgresql/data:ro
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    command: >
      sh -c "echo '0 */6 * * * /backup.sh' | crontab - && crond -f"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - digitatal-network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # === NocoDB (Admin Panel) ===
  nocodb:
    image: nocodb/nocodb:latest
    container_name: digitatal-nocodb
    restart: always
    mem_limit: 512m
    cpus: '0.5'
    ports:
      - "8081:8080"
    environment:
      NC_DB: "pg://postgres:5432?u=${POSTGRES_USER:-teacher}&p=${POSTGRES_PASSWORD:-changeme}&d=${POSTGRES_DB:-teaching}"
      NC_AUTH_JWT_SECRET: ${NOCODB_JWT_SECRET:-changeme}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - digitatal-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # === Web Interface (Next.js) ===
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: digitatal-web
    restart: always
    mem_limit: 512m
    cpus: '0.5'
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - digitatal-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # === Nginx ===
  nginx:
    image: nginx:alpine
    container_name: digitatal-nginx
    restart: always
    mem_limit: 256m
    cpus: '0.25'
    ports:
      - "8098:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
      web:
        condition: service_started
    networks:
      - digitatal-network
    # Note: Healthcheck disabled - nginx uses minimal alpine image
    # Health verified via external curl to http://localhost:8098/health
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  postgres_data:
  redis_data:
  uploads:
  student_files:
  ollama_data:

networks:
  digitatal-network:
    driver: bridge
